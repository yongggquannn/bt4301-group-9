name: Deploy Web App

on:
  pull_request:
    branches:
      - main
  repository_dispatch:
    types:
      - mlflow-model-promoted

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run lint
        run: ruff check source tests --select=E9,F63,F7,F82

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/webapp/requirements.txt
          pip install pytest httpx requests

      - name: Run tests
        run: pytest -q -m "not integration" || test $? -eq 5

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/webapp/Dockerfile -t bt4301-webapp:ci .

      - name: Deploy web app container
        run: |
          docker rm -f bt4301-webapp-ci || true
          docker run -d --name bt4301-webapp-ci -p 8000:8000 \
            -e POSTGRES_HOST=placeholder \
            -e POSTGRES_PORT=5432 \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB || 'kkbox' }} \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER || 'ci_user' }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD || 'ci_placeholder' }} \
            bt4301-webapp:ci

      - name: Smoke test deployment
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-all-errors http://127.0.0.1:8000/

      - name: Cleanup deployed container
        if: always()
        run: docker rm -f bt4301-webapp-ci || true
