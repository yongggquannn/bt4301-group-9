# ============================================================
# Data Cleansing Rules
# ============================================================

tables:

  # ----------------------------------------------------------
  # train_v2.csv
  # ----------------------------------------------------------
  train:
    null_handling:
      msno: drop_row          # Primary key — must not be null
      is_churn: drop_row      # Target variable — must not be null
    type_casting: {}
    duplicate_handling:
      strategy: none           # No duplicates found on msno
    outlier_treatment: {}

  # ----------------------------------------------------------
  # members_v3.csv
  # ----------------------------------------------------------
  members:
    null_handling:
      msno: drop_row
      city: keep               # No nulls observed
      bd: impute_median        # After outlier replacement (see outlier_treatment)
      gender: drop_column      # >50 % missing (94 517 / 172 033) — column removed
      registered_via: keep     # No nulls observed
      registration_init_time: keep  # No nulls observed
    type_casting:
      registration_init_time:
        from: int (YYYYMMDD)
        to: datetime64[ns]
    duplicate_handling:
      strategy: none           # No duplicates found on msno
    outlier_treatment:
      bd:
        rule: "Replace values < 18 or > 90 with NaN, then impute with median"
        reason: "Age values outside 18-90 are implausible (dataset contains -7000 to 2015)"

  # ----------------------------------------------------------
  # transactions_v2.csv
  # ----------------------------------------------------------
  transactions:
    null_handling:
      # No nulls in any column
      msno: keep
      payment_method_id: keep
      payment_plan_days: keep
      plan_list_price: keep
      actual_amount_paid: keep
      is_auto_renew: keep
      transaction_date: keep
      membership_expire_date: keep
      is_cancel: keep
    type_casting:
      payment_method_id:
        from: int
        to: category
        note: "Low-frequency IDs [3,6,8,10,11,12,13,14,16,18,20,22,26] merged into category 1"
      transaction_date:
        from: int (YYYYMMDD)
        to: datetime64[ns]
      membership_expire_date:
        from: int (YYYYMMDD)
        to: datetime64[ns]
    duplicate_handling:
      strategy: aggregate_by_msno
      description: >
        Multiple transactions per user are aggregated into one row.
        Aggregation logic:
          - payment_method_id: first occurrence
          - payment_plan_days: sum → total_payment_plan_days
          - plan_list_price: sum → total_plan_list_price
          - actual_amount_paid: sum → total_actual_amount_paid
          - is_auto_renew: first occurrence → is_auto_renewal
          - transaction_date: min → first_transaction_date, max → last_transaction_date
          - membership_expire_date: max
          - is_cancel: 0 if any cancellation (1) present, else 1
          - new column: no_of_transactions (count of rows per msno)
          - last_plan_days / last_plan_price: from the latest transaction
      single_transaction_users: "Kept as-is with no_of_transactions = 1"
    outlier_treatment: {}

  # ----------------------------------------------------------
  # user_logs_v2.csv
  # ----------------------------------------------------------
  user_logs:
    null_handling:
      # Not merged into final dataset in current EDA pipeline
      msno: keep
      date: keep
      num_25: keep
      num_50: keep
      num_75: keep
      num_985: keep
      num_100: keep
      num_unq: keep
      total_secs: keep
    type_casting:
      date:
        from: int (YYYYMMDD)
        to: datetime64[ns]
    duplicate_handling:
      strategy: not_applicable  # Table not used in final merge
    outlier_treatment: {}

# ----------------------------------------------------------
# Derived / Engineered columns (post-merge)
# ----------------------------------------------------------
derived_columns:
  membership_duration_days:
    formula: "membership_expire_date - registration_init_time (days)"
  transaction_span_days:
    formula: "last_transaction_date - first_transaction_date (days)"
  avg_plan_price:
    formula: "total_plan_list_price / no_of_transactions"
  avg_plan_days:
    formula: "total_payment_plan_days / no_of_transactions"
  amount_due:
    formula: "total_plan_list_price - total_actual_amount_paid"

# ============================================================
# Workstream E — Data validation rules
# ============================================================
# Each rule has a severity:
#   - blocking : failure raises SystemExit(1) so Airflow fails the task
#   - warning  : failure is persisted but the task still succeeds
#
# Types in required_columns match information_schema.columns.data_type
# (e.g. 'text', 'smallint', 'integer', 'numeric', 'timestamp with time zone').
# ------------------------------------------------------------
validation:

  # ---------------- schema contracts ----------------
  schema:
    - table: processed.customer_features
      severity: blocking
      required_columns:
        msno: text
        is_churn: smallint
        transaction_count: integer
        renewal_count: integer
        cancel_count: integer
        total_amount_paid: numeric
        num_active_days: integer
        total_secs: numeric
        feature_created_at: timestamp with time zone
    - table: processed.churn_predictions
      severity: blocking
      required_columns:
        customer_id: text
        churn_probability: numeric
        risk_tier: character varying
        scored_at: timestamp with time zone
    - table: processed.feature_snapshots
      severity: warning
      required_columns:
        snapshot_id: uuid
        status: character varying
        row_count: integer

  # ---------------- freshness ----------------
  # max_age_hours is picked to accommodate lab cadence (weekly manual triggers).
  freshness:
    - table: raw.members
      timestamp_column: ingestion_timestamp
      max_age_hours: 168
      severity: warning
    - table: raw.transactions
      timestamp_column: ingestion_timestamp
      max_age_hours: 168
      severity: warning
    - table: raw.user_logs
      timestamp_column: ingestion_timestamp
      max_age_hours: 168
      severity: warning
    - table: raw.train
      timestamp_column: ingestion_timestamp
      max_age_hours: 720  # labels are bounded historical; relaxed threshold
      severity: warning

  # ---------------- coverage / non-null thresholds ----------------
  coverage:
    - table: processed.customer_features
      column: msno
      min_non_null_ratio: 1.0
      severity: blocking
    - table: processed.customer_features
      column: is_churn
      min_non_null_ratio: 1.0
      severity: blocking
    - table: processed.customer_features
      column: transaction_count
      min_non_null_ratio: 0.95
      severity: blocking
    - table: processed.customer_features
      column: total_amount_paid
      min_non_null_ratio: 0.85
      severity: warning
    - table: processed.customer_features
      column: latest_payment_method_id
      min_non_null_ratio: 0.85
      severity: warning
    - table: processed.customer_features
      column: num_active_days
      min_non_null_ratio: 0.50
      severity: warning

  # ---------------- distribution drift vs persisted baseline ----------------
  # For each numeric column we record the current run's (mean, std, n) in
  # validation_results.detail. The next run pulls the most recent prior record
  # and fails if |curr_mean - baseline_mean| > deviation_threshold * baseline_std.
  distribution:
    table: processed.customer_features
    severity: warning
    deviation_threshold: 2.0
    numeric_columns:
      - transaction_count
      - total_amount_paid
      - num_active_days
      - total_secs

  # ---------------- legacy smoke checks (kept for continuity) ----------------
  smoke:
    - rule_name: row_count_positive
      severity: blocking
      kind: row_count_positive
      table: processed.customer_features
    - rule_name: row_count_matches_train
      severity: blocking
      kind: row_count_match
      left_table: processed.customer_features
      right_table: raw.train
    - rule_name: is_churn_binary
      severity: blocking
      kind: value_in_set
      table: processed.customer_features
      column: is_churn
      allowed_values: [0, 1]
    - rule_name: no_duplicate_msno
      severity: blocking
      kind: unique_column
      table: processed.customer_features
      column: msno
    - rule_name: bd_in_plausible_range
      severity: warning
      kind: numeric_range
      table: processed.customer_features
      column: bd
      min: 0
      max: 100
      allow_null: true
    - rule_name: total_amount_paid_non_negative
      severity: blocking
      kind: numeric_range
      table: processed.customer_features
      column: total_amount_paid
      min: 0
      allow_null: true
