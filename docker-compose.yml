x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow_db
    AIRFLOW__CORE__DAGS_FOLDER: /opt/project/source/dataops/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    PROJECT_ROOT: /opt/project
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    MLFLOW_TRACKING_URI: http://mlflow:${MLFLOW_PORT:-5001}
  volumes:
    - .:/opt/project

services:
  postgres:
    image: postgres:15
    container_name: bt4301_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: bt4301_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip install psycopg2-binary --quiet &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow_db
      --default-artifact-root mlflow-artifacts:/
      --host 0.0.0.0
      --allowed-hosts localhost,localhost:${MLFLOW_PORT:-5001},127.0.0.1,127.0.0.1:${MLFLOW_PORT:-5001},mlflow,mlflow:${MLFLOW_PORT:-5001}
      --port ${MLFLOW_PORT:-5001}"
    ports:
      - "${MLFLOW_PORT:-5001}:${MLFLOW_PORT:-5001}"
    volumes:
      - mlflow_artifacts:/mlruns

  airflow-init:
    <<: *airflow-common
    container_name: bt4301_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until airflow db migrate; do
          echo 'db migrate failed, retrying in 5s...' && sleep 5
        done
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: bt4301_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: bt4301_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: airflow scheduler
    restart: unless-stopped

  # Note: The webapp serves full results only after Airflow DAGs have run
  # (us8_dataops_e2e_pipeline + daily_churn_scoring). On a fresh start it
  # will show an empty dashboard until predictions are generated.
  webapp:
    build:
      context: ./docker/webapp
      dockerfile: Dockerfile
    container_name: bt4301_webapp
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: uvicorn source.webapp.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/opt/project
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
