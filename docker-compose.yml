version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: bt4301_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: bt4301_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pip install psycopg2-binary --quiet &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow_db
      --default-artifact-root mlflow-artifacts:/
      --host 0.0.0.0
      --port ${MLFLOW_PORT:-5001}"
    ports:
      - "${MLFLOW_PORT:-5001}:${MLFLOW_PORT:-5001}"
    volumes:
      - mlflow_artifacts:/mlruns
volumes:
  postgres_data:
  mlflow_artifacts:
