version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: bt4301_postgres
    environment:
      POSTGRES_USER: bt4301
      POSTGRES_PASSWORD: bt4301pass
      POSTGRES_DB: kkbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Put SQL files at repo root: db/init/*.sql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bt4301 -d kkbox"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
